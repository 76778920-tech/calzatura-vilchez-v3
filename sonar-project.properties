# SonarQube / SonarQube Cloud — copiar Project key exacto desde SonarCloud → Project information.
# organization = solo la org (p. ej. 76778920-tech); no pegar org_repo en sonar.organization.
sonar.projectKey=76778920-tech_calzatura-vilchez-v3
sonar.projectName=Calzatura Vilchez V3
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# SonarCloud organization (solo la clave de organización, sin sufijo del repo).
sonar.organization=76778920-tech

# Raíz del monorepo (informes LCOV/XML y sonar.sources son relativos a esto).
sonar.projectBaseDir=.

# Baseline de código nuevo (PRs y ramas). En SonarCloud UI: Settings → New Code → Reference branch = main.
sonar.newCode.referenceBranch=main

# Si la UI muestra "New code: since not provided": en SonarCloud → Project settings → New Code
# define referencia (p. ej. rama main o "Previous version"). Sin eso, las métricas de código nuevo pueden no actualizarse como esperas.

# Python: una sola raíz ai-service (no listar main.py/models/services por separado → ambigüedad en cobertura).
sonar.sources=calzatura-vilchez/src,calzatura-vilchez/functions,calzatura-vilchez/supabase,ai-service,.github

# Automated tests
sonar.tests=calzatura-vilchez/src/__tests__,calzatura-vilchez/functions/__tests__,calzatura-vilchez/e2e,ai-service/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/tests/**/*.py

# Coverage reports generated before the scan (lcov.info debe usar prefijo calzatura-vilchez/ en SF:;
# el job ejecuta scripts/fix-lcov-for-sonar.mjs tras Vitest para alinear con sonar.sources).
sonar.javascript.lcov.reportPaths=calzatura-vilchez/coverage/lcov.info
# Cobertura Python (solo Cobertura; no usar sonar.coverageReportPaths genérico en paralelo).
sonar.python.coverage.reportPaths=ai-service/coverage.xml
sonar.python.version=3.12

# Sin diccionario Oracle: no tratar .sql del repo como PL/SQL (evita aviso S3641/S3921/...).
sonar.plsql.file.suffixes=.pkb,.pks

# External analyzers (generate before sonar-scanner / GitHub Action scan)
sonar.eslint.reportPaths=calzatura-vilchez/eslint-report.json
sonar.python.bandit.reportPaths=ai-service/bandit-report.json

# Exclude pure data files from CPD (copy-paste detection) — structural repetition is unavoidable
# fnUtils.js replica reglas de stock en JS para Cloud Functions; la fuente canónica es src/utils/stock.ts.
sonar.cpd.exclusions=\
calzatura-vilchez/src/components/layout/headerMenuData.ts,\
calzatura-vilchez/src/domains/publico/pages/ThesisIsoPage.tsx,\
calzatura-vilchez/functions/index.js,\
calzatura-vilchez/functions/fnUtils.js

# Frontend UI: mucha ramificacion, cubierta por Vitest/Playwright. functions/ SI se analiza en Sonar.
# fnUtils.js replica stock.ts (CPD excluido); reducir complejidad con refactor modular en functions/.
