# SonarQube / SonarQube Cloud — copiar Project key exacto desde SonarCloud → Project information.
# organization = solo la org (p. ej. 76778920-tech); no pegar org_repo en sonar.organization.
sonar.projectKey=76778920-tech_calzatura-vilchez-v3
sonar.projectName=Calzatura Vilchez V3
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# SonarCloud organization (solo la clave de organización, sin sufijo del repo).
sonar.organization=76778920-tech

# Sin baseline SonarCloud marca todo el repo como "código nuevo" y exige ~295 líneas de cobertura.
sonar.newCode.referenceBranch=main

# Si la UI muestra "New code: since not provided": en SonarCloud → Project settings → New Code
# define referencia (p. ej. rama main o "Previous version"). Sin eso, las métricas de código nuevo pueden no actualizarse como esperas.

# Main source code
sonar.sources=calzatura-vilchez/src,calzatura-vilchez/functions,calzatura-vilchez/supabase,ai-service/main.py,ai-service/models,ai-service/services,ai-service/scripts,.github

# Automated tests
sonar.tests=calzatura-vilchez/src/__tests__,calzatura-vilchez/e2e,ai-service/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/tests/**/*.py

# Coverage reports generated before the scan (lcov.info debe usar prefijo calzatura-vilchez/ en SF:;
# el job ejecuta scripts/fix-lcov-for-sonar.mjs tras Vitest para alinear con sonar.sources).
sonar.javascript.lcov.reportPaths=calzatura-vilchez/coverage/lcov.info
# Cobertura Python: tras pytest, el workflow ejecuta ai-service/scripts/fix_coverage_xml_for_sonar.py
# para que filename sea ai-service/... y <source>.</source>, alineado con sonar.sources.
sonar.python.coverage.reportPaths=ai-service/coverage.xml
sonar.python.version=3.12

# Sin diccionario Oracle: no tratar .sql del repo como PL/SQL (evita aviso S3641/S3921/...).
sonar.plsql.file.suffixes=.pkb,.pks

# External analyzers (generate before sonar-scanner / GitHub Action scan)
sonar.eslint.reportPaths=calzatura-vilchez/eslint-report.json
sonar.python.bandit.reportPaths=ai-service/bandit-report.json

# Exclude pure data files from CPD (copy-paste detection) — structural repetition is unavoidable
# fnUtils.js replica reglas de stock en JS para Cloud Functions; la fuente canónica es src/utils/stock.ts.
sonar.cpd.exclusions=\
calzatura-vilchez/src/components/layout/headerMenuData.ts,\
calzatura-vilchez/src/domains/publico/pages/ThesisIsoPage.tsx,\
calzatura-vilchez/functions/index.js,\
calzatura-vilchez/functions/fnUtils.js

# Avoid generated files, dependencies, build outputs and local reports
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/.firebase/**,**/.scannerwork/**,**/__pycache__/**,**/*.pyc,calzatura-vilchez/functions/lib/**,calzatura-vilchez/src/__tests__/**,calzatura-vilchez/src/**/*.test.ts,calzatura-vilchez/src/**/*.test.tsx,calzatura-vilchez/e2e/**,ai-service/tests/**,**/eslint-report.json,**/bandit-report.json,calzatura-vilchez/supabase/migrations/**,calzatura-vilchez/src/index.css,calzatura-vilchez/src/domains/administradores/pages/AdminData.tsx,calzatura-vilchez/src/domains/administradores/predictions/AdminPredictionsDashboardTabs.tsx,calzatura-vilchez/src/domains/administradores/predictions/adminPredictionsLogic.tsx,calzatura-vilchez/src/domains/administradores/utils/importRules.ts,calzatura-vilchez/src/domains/productos/pages/adminProductsView/AdminProductCreateVariantsPanel.tsx,calzatura-vilchez/src/domains/productos/pages/adminProductsView/AdminProductModal.tsx,calzatura-vilchez/src/domains/productos/pages/ProductsPage.tsx,calzatura-vilchez/src/domains/publico/components/HomeHeroSection.tsx,calzatura-vilchez/src/domains/publico/pages/HomePage.tsx,calzatura-vilchez/src/domains/publico/pages/Logo3DPage.tsx,calzatura-vilchez/src/domains/ventas/pages/AdminSalesHistorialTable.tsx,calzatura-vilchez/src/domains/ventas/pages/AdminSalesLoadedView.tsx

