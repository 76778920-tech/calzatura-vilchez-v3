<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview Tarjeta Producto</title>
  <style>
    :root {
      --gold: #c9a227;
      --bg: #0b0b0b;
      --panel: #121212;
      --text: #efe9de;
      --muted: #b1a89c;
      --border: rgba(201, 162, 39, 0.26);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #171717, #090909 58%);
      font-family: Inter, system-ui, Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .demo-wrap {
      width: min(420px, 92vw);
    }

    .demo-title {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .product-card {
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 16px 42px rgba(17, 17, 17, 0.08);
      background: transparent;
    }

    .product-card-img-wrapper {
      aspect-ratio: 1 / 1.2;
      background: transparent;
      display: grid;
      place-items: end center;
      padding-top: 12px;
    }

    .product-card-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      transform: scale(1.16);
      filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.38));
    }

    .product-card-body {
      padding: 0.9rem 0.95rem 1rem;
      background: linear-gradient(180deg, rgba(18, 18, 18, 0.72), rgba(10, 10, 10, 0.92));
    }

    .product-card-category {
      display: block;
      font-size: 10px;
      letter-spacing: 1px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }

    .product-card-name {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .product-card-brand {
      margin: 0.2rem 0 0.55rem;
      font-size: 1rem;
      color: var(--muted);
    }

    .product-card-footer {
      margin-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-card-price {
      font-size: 2rem;
      color: var(--gold);
      font-weight: 800;
    }

    .add-to-cart-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #0e0e0e;
      cursor: pointer;
    }

    .like-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: none;
      background: #f1eee9;
      color: #6c665f;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="demo-wrap">
    <p class="demo-title">Muestra visual (1 tarjeta)</p>
    <article class="product-card">
      <button class="like-btn" aria-label="Favorito">♡</button>

      <div class="product-card-img-wrapper">
        <img
          class="product-card-img"
          src="/placeholder-product.svg"
          alt="Bota casual urbana"
        />
      </div>

      <div class="product-card-body">
        <span class="product-card-category">CASUAL</span>
        <h3 class="product-card-name">Bota Casual Urbana</h3>
        <p class="product-card-brand">Clarks</p>

        <div class="product-card-footer">
          <strong class="product-card-price">S/ 131.12</strong>
          <button class="add-to-cart-btn" aria-label="Agregar al carrito">🛒</button>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
