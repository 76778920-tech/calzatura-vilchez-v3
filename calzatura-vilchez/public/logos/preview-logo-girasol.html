<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview Logo Calzatura Vilchez</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: Arial, sans-serif;
    }
    .logo-container { text-align: center; padding: 2rem; }
    svg { filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2)); }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFD700" />
          <stop offset="50%" stop-color="#FFA500" />
          <stop offset="100%" stop-color="#FF8C00" />
        </radialGradient>
        <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#228B22" />
          <stop offset="100%" stop-color="#32CD32" />
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur" />
          <feMerge>
            <feMergeNode in="coloredBlur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <rect x="195" y="250" width="10" height="120" rx="5" fill="#228B22" filter="url(#glow)" />

      <path d="M 170 280 Q 150 300 140 320 Q 145 330 160 325 Q 175 320 185 300 Q 190 290 170 280 Z"
            fill="url(#leafGradient)" stroke="#006400" stroke-width="2" filter="url(#glow)" />
      <path d="M 230 320 Q 250 340 260 360 Q 255 370 240 365 Q 225 360 215 340 Q 210 330 230 320 Z"
            fill="url(#leafGradient)" stroke="#006400" stroke-width="2" filter="url(#glow)" />

      <circle cx="200" cy="180" r="60" fill="#8B4513" stroke="#654321" stroke-width="4" filter="url(#glow)" />

      <g filter="url(#glow)">
        <ellipse cx="200" cy="120" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(0 200 120)" />
        <ellipse cx="225" cy="135" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(20 225 135)" />
        <ellipse cx="250" cy="170" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(45 250 170)" />
        <ellipse cx="235" cy="210" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(70 235 210)" />
        <ellipse cx="200" cy="235" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(90 200 235)" />
        <ellipse cx="165" cy="210" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(110 165 210)" />
        <ellipse cx="150" cy="170" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(135 150 170)" />
        <ellipse cx="175" cy="135" rx="25" ry="45" fill="url(#sunGradient)" stroke="#FF4500" stroke-width="2" transform="rotate(160 175 135)" />

        <ellipse cx="200" cy="130" rx="12" ry="22" fill="#FFFACD" stroke="#FFD700" stroke-width="1" transform="rotate(0 200 130)" opacity="0.8" />
        <ellipse cx="225" cy="142" rx="12" ry="22" fill="#FFFACD" stroke="#FFD700" stroke-width="1" transform="rotate(20 225 142)" opacity="0.8" />
      </g>

      <g fill="#D2691E" stroke="#A0522D" stroke-width="0.5">
        <circle cx="185" cy="170" r="2" />
        <circle cx="190" cy="175" r="1.5" />
        <circle cx="195" cy="180" r="2" />
        <circle cx="200" cy="165" r="1.8" />
        <circle cx="205" cy="185" r="2" />
        <circle cx="210" cy="170" r="1.5" />
        <circle cx="215" cy="175" r="2" />
        <circle cx="188" cy="182" r="1.7" />
        <circle cx="193" cy="168" r="1.6" />
        <circle cx="198" cy="172" r="1.9" />
        <circle cx="203" cy="178" r="1.8" />
        <circle cx="208" cy="162" r="1.7" />
      </g>

      <text x="200" y="380" text-anchor="middle" font-family="Arial Black, sans-serif"
            font-size="28" font-weight="bold" fill="#2C5530" stroke="#1B3F22" stroke-width="0.5" filter="url(#glow)">
        CALZATURA VILCHEZ
      </text>
      <text x="200" y="394" text-anchor="middle" font-family="Arial, sans-serif"
            font-size="14" fill="#4A7C59" font-weight="500">
        Calzado con estilo natural
      </text>
    </svg>
  </div>
</body>
</html>
