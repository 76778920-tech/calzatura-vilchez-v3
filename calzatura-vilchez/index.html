<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP principal: va en el HTML para que coincida con el bundle (evita cabecera HTTP en caché sin Stripe). frame-ancestors solo en firebase.json -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://js.stripe.com https://*.js.stripe.com https://checkout.stripe.com; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://*.google.com https://js.stripe.com https://*.js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; worker-src 'self' blob: https://js.stripe.com https://*.js.stripe.com"
    />
    <title>Calzatura Vilchez</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
