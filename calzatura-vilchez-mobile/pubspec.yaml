name: calzatura_vilchez_mobile
description: "Calzatura Vilchez — App móvil con IA para predicción de riesgo empresarial"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Autenticación y base de datos Firebase (mismo que la web) ───────────────
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # ── Base de datos (mismo Supabase que la web) ──────────────────────────────
  supabase_flutter: ^2.9.1

  # ── Navegación ─────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Estado global ──────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── HTTP (llamadas al servicio IA) ─────────────────────────────────────────
  http: ^1.4.0

  # ── UI / Animaciones ───────────────────────────────────────────────────────
  animations: ^2.0.11
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1

  # ── Gráficas (IRE / revenue) ───────────────────────────────────────────────
  fl_chart: ^0.71.0

  # ── Refresh ────────────────────────────────────────────────────────────────
  custom_refresh_indicator: ^3.0.0

  # ── Utilidades ─────────────────────────────────────────────────────────────
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.1.0
  badges: ^3.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
