# Monorepo: app Flutter en calzatura-vilchez-mobile/
# Guía Práctica N° 13 — compilación iOS (Codemagic).
# iOS = app de cliente únicamente (sin panel admin/trabajador).
#
# FIRMA GRATIS (como en la guía del docente):
#   distribution_type: development  + certificado "Apple Development"
#   NO usar app_store (eso exige Apple Developer Program de pago).
#
# Codemagic → Team settings → Code signing identities:
#   1) iOS certificates → Generate o subir .p12 → tipo Apple Development
#   2) iOS provisioning profiles → Fetch/Upload → perfil Development
#      para com.calzaturavilchez.calzaturaVilchezMobile
workflows:
  ios-build:
    name: Calzatura Vilchez iOS
    max_build_duration: 45
    instance_type: mac_mini_m2
    working_directory: calzatura-vilchez-mobile
    environment:
      groups:
        - calzatura_mobile
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.calzaturavilchez.calzaturaVilchezMobile
      vars:
        BUNDLE_ID: com.calzaturavilchez.calzaturaVilchezMobile
    scripts:
      - name: Verificar Firebase iOS
        script: |
          test -f ios/Runner/GoogleService-Info.plist
          grep -q "adde262e67f91bc36baa62" ios/Runner/GoogleService-Info.plist
      - name: Dependencias
        script: flutter pub get
      - name: Crear .env para release
        script: |
          cat > .env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          BACKEND_API_URL=$BACKEND_API_URL
          DNI_LOOKUP_URL=$DNI_LOOKUP_URL
          STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY
          AI_SERVICE_URL=$AI_SERVICE_URL
          AI_SERVICE_BEARER_TOKEN=$AI_SERVICE_BEARER_TOKEN
          SUPERADMIN_EMAIL=$SUPERADMIN_EMAIL
          EOF
      - name: Análisis y pruebas
        script: |
          flutter analyze
          flutter test
      - name: Aplicar perfiles de firma (Codemagic)
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions-development.plist
    artifacts:
      - build/ios/ipa/*.ipa
