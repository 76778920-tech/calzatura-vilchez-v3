name: CI Integration — Calzatura Vilchez (main only, secrets reales)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  supabase-migrations:
    name: Validar migraciones Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validar migraciones SQL versionadas
        run: node scripts/validate-supabase-migrations.mjs

  supabase-remote-parity:
    name: Paridad migraciones Supabase (remoto)
    needs: [supabase-migrations]
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar Supabase CLI (app)
        working-directory: calzatura-vilchez
        run: npm ci --ignore-scripts

      - name: Comparar migraciones locales vs remoto
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/verify-supabase-migration-parity.mjs

      - name: Recordatorio post-deploy (db push manual)
        run: |
          test -f docs/ops/post-deploy-supabase-migrations.md
          echo "Migraciones: tras deploy en main, aplicar db push segun docs/ops/post-deploy-supabase-migrations.md"

  # ── Job 1: Lint + Tests + Coverage + Build con secrets reales ────────────────
  quality:
    name: Calidad + Build (secrets reales)
    needs: [supabase-migrations, supabase-remote-parity]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calzatura-vilchez

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Lint (ESLint)
        run: npm run lint

      - name: Pruebas unitarias (Vitest)
        run: npm test
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Cobertura de código (Vitest Coverage)
        run: npm run test:coverage
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Subir reporte de cobertura (HTML)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-integration
          path: calzatura-vilchez/coverage/
          retention-days: 30

      - name: Verificar tipos TypeScript
        run: npm run typecheck

      - name: Compilar proyecto (Vite build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          # VITE_AI_SERVICE_BEARER_TOKEN no va en el build — vive en la Cloud Function (Firebase Secret).
          VITE_AI_ADMIN_PROXY_URL: ${{ secrets.VITE_AI_ADMIN_PROXY_URL }}
          VITE_BACKEND_API_URL: ${{ secrets.VITE_BACKEND_API_URL || 'https://ci-bff-placeholder.onrender.com' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}

  # ── Job 2: AI Service con validación real de Supabase ────────────────────────
  ai-service:
    name: AI Service + Schema Supabase (real)
    needs: [supabase-migrations, supabase-remote-parity]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configurar Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements-dev.txt

      - name: Instalar dependencias
        run: bash scripts/ci_install_python_deps.sh

      - name: Verificar script Docker vs requirements.lock
        run: python scripts/verify_docker_install_sync.py

      - name: Pruebas backend IA (pytest)
        run: python -m pytest

      - name: Verificar esquema real ireHistorial en Supabase
        run: python scripts/verify_ire_historial_schema.py --write-probe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  ai-service-docker:
    name: AI Service — Docker build (Render)
    needs: [supabase-migrations, supabase-remote-parity]
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verificar script Docker vs requirements.lock
        working-directory: ai-service
        run: python scripts/verify_docker_install_sync.py

      - name: Build imagen Docker
        working-directory: ai-service
        run: docker build -t calzatura-ai-service:ci .

      - name: Smoke — dependencias e import de la app en contenedor
        run: |
          docker run --rm \
            -e SUPABASE_URL=https://ci-placeholder.supabase.co \
            -e SUPABASE_SERVICE_KEY=ci-placeholder-key \
            -e AI_SERVICE_BEARER_TOKEN=ci-test-token \
            calzatura-ai-service:ci \
            python -c "import fastapi, sklearn, pandas; from main import app; print('docker-smoke-ok', app.title)"

  # ── Job 3: E2E Playwright con credenciales reales ────────────────────────────
  ops-controls-real:
    name: Controles medibles IA/DevOps (real)
    needs: [quality, ai-service, ai-service-docker]
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20

      - name: Configurar Python 3.12 para backtesting IA
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements-dev.txt

      - name: Instalar dependencias IA
        working-directory: ai-service
        run: bash scripts/ci_install_python_deps.sh

      - name: Readiness live BFF/IA
        env:
          BFF_BASE_URL: ${{ secrets.VITE_BACKEND_API_URL }}
          AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          READINESS_BFF_MAX_MS: 5000
          # Render cold start del AI Service puede superar 5s; 15s mantiene detección de caídas reales.
          READINESS_AI_MAX_MS: 15000
        run: |
          node scripts/readiness-check.mjs \
            --require-env BFF_BASE_URL \
            --require-env AI_SERVICE_URL \
            --timeout-ms 25000 \
            --retries 2 \
            --output artifacts/readiness/integration-live.json

      - name: Backtesting IA real con umbrales
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node scripts/ai-backtest-gate.mjs \
            --run \
            --history 180 \
            --folds 6 \
            --max-mape-pct 150 \
            --min-wins-mape-ratio 0.34 \
            --min-folds 3 \
            --min-density-pct 0.5 \
            --min-comparison-density-pct 5 \
            --output artifacts/ai-backtesting/integration-summary.json

      - name: Restore drill - evidencia operativa versionada
        run: |
          node scripts/restore-drill-check.mjs \
            --evidence docs/ops/restore-drill-evidence.ci.json \
            --max-rto-minutes 60 \
            --max-rpo-minutes 1440 \
            --output artifacts/restore-drill/integration-summary.json

      - name: Subir evidencia real de controles
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ops-controls-real-evidence
          path: artifacts/
          retention-days: 30

  e2e:
    name: E2E Playwright — Integración real
    needs: [supabase-migrations, supabase-remote-parity]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calzatura-vilchez

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Obtener versión de Playwright
        id: pw-version
        run: |
          unset NO_COLOR FORCE_COLOR
          echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Caché de navegadores Playwright
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ steps.pw-version.outputs.version }}

      - name: Instalar Chromium + dependencias del sistema (primera vez)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: node scripts/run-playwright.mjs install --with-deps chromium

      - name: Instalar dependencias del sistema (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: node scripts/run-playwright.mjs install-deps chromium

      - name: Ejecutar pruebas E2E
        run: npm run test:e2e
        env:
          CI: "true"
          VITE_BACKEND_API_URL: http://127.0.0.1:5173
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          # VITE_AI_SERVICE_BEARER_TOKEN omitido: E2E usa mocks de red (page.route), no llama al servicio real.
          VITE_AI_ADMIN_PROXY_URL: ${{ secrets.VITE_AI_ADMIN_PROXY_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Subir reporte Playwright (siempre)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-integration
          path: calzatura-vilchez/playwright-report/
          retention-days: 30

  deploy-production:
    name: Deploy — Producción (Firebase + Render)
    needs: [quality, ai-service, ai-service-docker, ops-controls-real, e2e, supabase-remote-parity]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/deploy-production.yml
    with:
      head_sha: ${{ github.sha }}
    secrets:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
      VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
      VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
      VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
      VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
      VITE_AI_ADMIN_PROXY_URL: ${{ secrets.VITE_AI_ADMIN_PROXY_URL }}
      VITE_BACKEND_API_URL: ${{ secrets.VITE_BACKEND_API_URL }}
      VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
      VITE_ORS_API_KEY: ${{ secrets.VITE_ORS_API_KEY }}
      RENDER_BFF_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BFF_DEPLOY_HOOK_URL }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
