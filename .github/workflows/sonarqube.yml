name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: Static analysis + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configurar Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias web
        working-directory: calzatura-vilchez
        run: npm ci

      - name: Generar cobertura frontend (Vitest LCOV)
        working-directory: calzatura-vilchez
        run: npm run test:coverage
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-test-api-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-test.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-test' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '123456789' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:123456789:web:abcdef' }}

      - name: Generar informe ESLint (JSON para SonarQube)
        working-directory: calzatura-vilchez
        run: npm run lint:report

      - name: Configurar Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements-dev.txt

      - name: Instalar dependencias IA
        working-directory: ai-service
        run: python -m pip install -r requirements-dev.txt

      - name: Generar cobertura IA (pytest XML)
        working-directory: ai-service
        run: python -m pytest --cov=main --cov=models --cov=services --cov-report=xml:coverage.xml

      - name: Generar informe Bandit (JSON para SonarQube)
        working-directory: ai-service
        run: python -m bandit -r main.py models services -f json -o bandit-report.json --exit-zero

      - name: Verificar reportes para SonarQube
        shell: bash
        run: |
          test -f calzatura-vilchez/coverage/lcov.info
          test -f ai-service/coverage.xml
          test -f calzatura-vilchez/eslint-report.json
          test -f ai-service/bandit-report.json

      - name: Validar configuracion SonarQube
        id: sonar-config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SonarQube omitido. Configura el secret SONAR_TOKEN para activar el analisis."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Ayuda a diagnosticar "Project not found": debe coincidir con SonarCloud → Project information → Project key
      - name: Mostrar claves Sonar (sin SONAR_TOKEN)
        if: steps.sonar-config.outputs.ready == 'true'
        shell: bash
        run: |
          test -f sonar-project.properties
          echo "=== Valores que leera sonar-scanner (raiz del repo) ==="
          grep -E '^(sonar\.organization|sonar\.projectKey)=' sonar-project.properties || true
          echo "=== Repositorio GitHub ==="
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-}"

      - name: Ejecutar analisis SonarQube
        if: steps.sonar-config.outputs.ready == 'true'
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.qualitygate.wait=true"
