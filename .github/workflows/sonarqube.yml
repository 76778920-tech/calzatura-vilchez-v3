name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      close_stale_coverage_issues:
        description: "Cerrar issues fantasma fix_coverage_xml_for_sonar.py"
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: Static analysis + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias web
        working-directory: calzatura-vilchez
        run: npm ci --ignore-scripts

      - name: Generar cobertura frontend (Vitest LCOV + rutas para Sonar)
        working-directory: calzatura-vilchez
        run: npm run test:coverage:sonar
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-test-api-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-test.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-test' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '123456789' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:123456789:web:abcdef' }}

      - name: Generar informe ESLint (JSON para SonarQube)
        working-directory: calzatura-vilchez
        run: npm run lint:report

      - name: Configurar Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements-dev.txt

      - name: Instalar dependencias IA
        working-directory: ai-service
        run: bash scripts/ci_install_python_deps.sh

      - name: Generar cobertura IA (pytest XML)
        working-directory: ai-service
        run: python -m pytest --cov=. --cov-config=.coveragerc --cov-report=xml:coverage.xml

      - name: Ajustar coverage.xml a rutas monorepo Sonar
        run: python scripts/fix-ai-service-coverage-xml-for-sonar.py

      - name: Generar informe Bandit (JSON para SonarQube)
        working-directory: ai-service
        run: python -m bandit -r main.py models services -f json -o bandit-report.json --exit-zero

      - name: Verificar reportes para SonarQube
        shell: bash
        run: |
          test -f calzatura-vilchez/coverage/lcov.info
          test -f ai-service/coverage.xml
          test -f calzatura-vilchez/eslint-report.json
          test -f ai-service/bandit-report.json
          grep -q 'SF:calzatura-vilchez/src/' calzatura-vilchez/coverage/lcov.info
          grep -q 'filename="ai-service/models/revenue.py"' ai-service/coverage.xml
          grep -q 'filename="ai-service/models/safe_limits.py"' ai-service/coverage.xml
          grep -q 'filename="ai-service/services/supabase_client.py"' ai-service/coverage.xml
          node scripts/validate-sonar-coverage-reports.mjs

      - name: Validar configuracion SonarQube
        id: sonar-config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        run: |
          host="${SONAR_HOST_URL:-https://sonarcloud.io}"
          host="${host%/}"

          if [ -z "$SONAR_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SonarQube omitido. Configura el secret SONAR_TOKEN (SonarCloud → My Account → Security → Generate Token)."
            exit 0
          fi

          http_code="$(curl -s -o /dev/null -w "%{http_code}" -u "${SONAR_TOKEN}:" "${host}/api/authentication/validate")"
          if [ "$http_code" = "200" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN rechazado por SonarCloud (HTTP ${http_code}). Regenera el token de analisis y actualiza el secret del repositorio. Cobertura, ESLint y Bandit se generan igual; el escaneo Sonar queda pendiente hasta corregir credenciales."
          fi

      - name: Diagnostico cobertura (logs; revisar si Sonar no baja lineas)
        if: steps.sonar-config.outputs.ready == 'true'
        shell: bash
        run: |
          echo "=== LCOV: primeras rutas SF: (deben empezar por calzatura-vilchez/) ==="
          grep '^SF:' calzatura-vilchez/coverage/lcov.info | head -8
          echo "=== Cobertura XML: fuente y revenue ==="
          grep -m1 '<source>' ai-service/coverage.xml
          grep 'filename="ai-service/services/supabase_client.py"' ai-service/coverage.xml | head -1 || true
          echo "=== stock.ts en lcov (fragmento) ==="
          grep -A2 'SF:calzatura-vilchez/src/utils/stock.ts' calzatura-vilchez/coverage/lcov.info | head -6 || true

      # Ayuda a diagnosticar "Project not found": debe coincidir con SonarCloud → Project information → Project key
      - name: Mostrar claves Sonar (sin SONAR_TOKEN)
        if: steps.sonar-config.outputs.ready == 'true'
        shell: bash
        run: |
          test -f sonar-project.properties
          echo "=== Valores que leera sonar-scanner (raiz del repo) ==="
          grep -E '^(sonar\.organization|sonar\.projectKey)=' sonar-project.properties || true
          echo "=== Repositorio GitHub ==="
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-}"

      - name: Cerrar issues fantasma del script coverage eliminado
        if: steps.sonar-config.outputs.ready == 'true'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        run: node scripts/close-sonar-stale-coverage-shim-issues.mjs

      - name: Ejecutar analisis SonarQube (intento 1)
        id: sonar-scan-1
        if: steps.sonar-config.outputs.ready == 'true'
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # qualitygate.wait=true → exit code 3 si el Quality Gate en SonarCloud esta Failed.
          args: >
            "-Dsonar.qualitygate.wait=true"
            "-Dsonar.projectBaseDir=."
            "-Dsonar.newCode.referenceBranch=main"
            "-Dsonar.javascript.lcov.reportPaths=calzatura-vilchez/coverage/lcov.info"
            "-Dsonar.python.coverage.reportPaths=ai-service/coverage.xml"

      - name: Esperar antes de reintentar Sonar (503 / saturacion SonarCloud)
        if: steps.sonar-config.outputs.ready == 'true' && steps.sonar-scan-1.outcome == 'failure'
        run: sleep 90

      - name: Ejecutar analisis SonarQube (intento 2)
        id: sonar-scan-2
        if: steps.sonar-config.outputs.ready == 'true' && steps.sonar-scan-1.outcome == 'failure'
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.qualitygate.wait=true"
            "-Dsonar.projectBaseDir=."
            "-Dsonar.newCode.referenceBranch=main"
            "-Dsonar.javascript.lcov.reportPaths=calzatura-vilchez/coverage/lcov.info"
            "-Dsonar.python.coverage.reportPaths=ai-service/coverage.xml"

      - name: Esperar antes de reintentar Sonar (intento 3)
        if: steps.sonar-config.outputs.ready == 'true' && steps.sonar-scan-1.outcome == 'failure' && steps.sonar-scan-2.outcome == 'failure'
        run: sleep 120

      - name: Ejecutar analisis SonarQube (intento 3)
        id: sonar-scan-3
        if: steps.sonar-config.outputs.ready == 'true' && steps.sonar-scan-1.outcome == 'failure' && steps.sonar-scan-2.outcome == 'failure'
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.qualitygate.wait=true"
            "-Dsonar.projectBaseDir=."
            "-Dsonar.newCode.referenceBranch=main"
            "-Dsonar.javascript.lcov.reportPaths=calzatura-vilchez/coverage/lcov.info"
            "-Dsonar.python.coverage.reportPaths=ai-service/coverage.xml"

      - name: Verificar resultado del analisis SonarQube
        if: steps.sonar-config.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.sonar-scan-1.outcome }}" = "success" ]; then
            echo "SonarQube OK (intento 1)"
            exit 0
          fi
          if [ "${{ steps.sonar-scan-2.outcome }}" = "success" ]; then
            echo "SonarQube OK (intento 2)"
            exit 0
          fi
          if [ "${{ steps.sonar-scan-3.outcome }}" = "success" ]; then
            echo "SonarQube OK (intento 3)"
            exit 0
          fi
          echo "::error::SonarQube fallo tras 3 intentos (p. ej. HTTP 503 al subir el informe). Reejecuta el workflow o comprueba https://status.sonarcloud.io"
          exit 1

      - name: Reintentar cierre issues fantasma (post-scan)
        if: always() && steps.sonar-config.outputs.ready == 'true'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        run: node scripts/close-sonar-stale-coverage-shim-issues.mjs
