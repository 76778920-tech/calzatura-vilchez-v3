name: Deploy — Producción (Firebase + Render)

# Invocado por CI Integration (workflow_call) tras pasar quality + IA + E2E en main.
# workflow_dispatch: deploy manual (omite verificación de otros workflows).

on:
  workflow_call:
    inputs:
      head_sha:
        description: Commit en main a desplegar
        required: true
        type: string
    secrets:
      FIREBASE_SERVICE_ACCOUNT:
        required: true
      VITE_SUPABASE_URL:
        required: true
      VITE_FIREBASE_API_KEY:
        required: true
      VITE_FIREBASE_APPCHECK_SITE_KEY:
        required: true
      VITE_FIREBASE_AUTH_DOMAIN:
        required: false
      VITE_FIREBASE_PROJECT_ID:
        required: false
      VITE_FIREBASE_MESSAGING_SENDER_ID:
        required: false
      VITE_FIREBASE_APP_ID:
        required: false
      VITE_SUPABASE_ANON_KEY:
        required: false
      VITE_STRIPE_PUBLIC_KEY:
        required: false
      VITE_CLOUDINARY_CLOUD_NAME:
        required: false
      VITE_CLOUDINARY_UPLOAD_PRESET:
        required: false
      VITE_DNI_LOOKUP_URL:
        required: false
      VITE_AI_SERVICE_URL:
        required: false
      VITE_AI_ADMIN_PROXY_URL:
        required: false
      VITE_BACKEND_API_URL:
        required: false
      VITE_ORS_API_KEY:
        required: false
      RENDER_BFF_DEPLOY_HOOK_URL:
        required: false
      RENDER_DEPLOY_HOOK_URL:
        required: false
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI_WORKFLOW_NAME: CI — Sistema Web con IA para Predicción de Riesgo Empresarial — Calzatura Vilchez
  CI_INTEGRATION_NAME: CI Integration — Calzatura Vilchez (main only, secrets reales)

jobs:
  gate:
    name: Verificar CI completo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      head_sha: ${{ steps.sha.outputs.head_sha }}
    steps:
      - name: Resolver SHA del despliegue
        id: sha
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.sha }}
          CALL_HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "head_sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=$CALL_HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.sha.outputs.head_sha }}
          fetch-depth: 0

      - name: Exigir commit en main
        env:
          DEPLOY_SHA: ${{ steps.sha.outputs.head_sha }}
        run: bash scripts/verify-deploy-checkout-sha.sh "$DEPLOY_SHA"

      - name: Exigir CI + CI Integration en success (solo tras workflow_call)
        if: github.event_name == 'workflow_call'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.sha.outputs.head_sha }}
          REQUIRED_WORKFLOWS: ${{ env.CI_WORKFLOW_NAME }}|${{ env.CI_INTEGRATION_NAME }}
        run: node scripts/github-verify-workflows-for-sha.mjs

      - name: Verificar workflows listos para deploy
        env:
          DEPLOY_SHA: ${{ steps.sha.outputs.head_sha }}
        run: echo "Gate OK — SHA $DEPLOY_SHA"

  render-bff-service:
    name: Render — BFF
    needs: gate
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Comprobar hook Render BFF
        env:
          RENDER_BFF_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BFF_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_BFF_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_BFF_DEPLOY_HOOK_URL no configurado — el BFF no se puede redeployar."
            echo "Render → servicio BFF → Settings → Deploy Hook → copiar URL → GitHub Secrets."
            exit 1
          fi

      - name: Disparar deploy hook BFF
        env:
          RENDER_BFF_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BFF_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_BFF_DEPLOY_HOOK_URL"
          echo "Deploy hook BFF enviado."

      - name: Esperar health y rutas BFF
        env:
          BFF_BASE: ${{ secrets.VITE_BACKEND_API_URL || 'https://calzatura-vilchez-bff.onrender.com' }}
        run: |
          base="${BFF_BASE%/}"
          echo "Comprobando $base/health (hasta 12 min por cold start/deploy)..."
          for i in $(seq 1 48); do
            if curl -fsS "$base/health" >/dev/null 2>&1; then
              echo "BFF health OK en intento $i"
              break
            fi
            sleep 15
          done
          if ! curl -fsS "$base/health" >/dev/null 2>&1; then
            echo "::error::BFF no respondió en /health"
            exit 1
          fi

          echo "Esperando rutas nuevas del BFF..."
          for i in $(seq 1 48); do
            users_code="$(curl -sS -o /tmp/bff_users_me_check.json -w "%{http_code}" "$base/users/me" || true)"
            admin_code="$(curl -sS -o /tmp/bff_admin_users_check.json -w "%{http_code}" "$base/admin/users" || true)"
            if [ "$users_code" = "401" ] && [ "$admin_code" = "401" ]; then
              echo "Rutas BFF nuevas disponibles (401 sin token, esperado)."
              exit 0
            fi
            echo "Intento $i: /users/me=$users_code /admin/users=$admin_code; esperando deploy..."
            sleep 15
          done
          echo "::error::Rutas BFF desactualizadas tras deploy; se esperaba 401 sin token en /users/me y /admin/users."
          exit 1

  firebase-hosting:
    name: Firebase Hosting
    needs: [gate, render-bff-service]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0

      # GitHub no permite `secrets` en `if:` de pasos; el JSON Firebase rompe `test -n` en bash.
      - name: Verificar secrets Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
        run: node scripts/verify-deploy-firebase-secrets.mjs

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        working-directory: calzatura-vilchez
        run: npm ci --ignore-scripts

      - name: Compilar (Vite)
        working-directory: calzatura-vilchez
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          VITE_AI_ADMIN_PROXY_URL: ${{ secrets.VITE_AI_ADMIN_PROXY_URL }}
          VITE_BACKEND_API_URL: ${{ secrets.VITE_BACKEND_API_URL }}
          VITE_ORS_API_KEY: ${{ secrets.VITE_ORS_API_KEY }}

      - name: Deploy a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # node24 (upstream main, PR #450)
        with:
          repoToken: ${{ github.token }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: calzaturavilchez-ab17f
          channelId: live
          entryPoint: ./calzatura-vilchez

      - name: Smoke — web en producción
        run: |
          for i in $(seq 1 12); do
            if curl -fsS -o /dev/null -w "%{http_code}" "https://calzaturavilchez-ab17f.web.app" | grep -qE '^200|301|302'; then
              echo "Firebase Hosting responde."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Hosting no respondió tras deploy"
          exit 1

  render-ai-service:
    name: Render — AI Service
    needs: gate
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions: {}
    steps:
      - name: Comprobar hook Render
        id: render_hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::RENDER_DEPLOY_HOOK_URL no configurado — se omite redeploy del AI Service."
            echo "Render → servicio IA → Settings → Deploy Hook → copiar URL → GitHub Secrets."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Disparar deploy hook
        if: steps.render_hook.outputs.ready == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Deploy hook enviado."

      - name: Esperar health del servicio IA (cold start)
        if: steps.render_hook.outputs.ready == 'true'
        env:
          AI_BASE: ${{ secrets.VITE_AI_SERVICE_URL || 'https://calzatura-vilchez-v3.onrender.com' }}
        run: |
          base="${AI_BASE%/}"
          url="${base}/api/health"
          echo "Comprobando $url (hasta 12 min por cold start)..."
          for i in $(seq 1 48); do
            if curl -fsS "$url" >/dev/null 2>&1; then
              echo "AI Service OK en intento $i"
              exit 0
            fi
            sleep 15
          done
          echo "::error::AI Service no respondió en /api/health"
          exit 1
