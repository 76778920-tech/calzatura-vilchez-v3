name: Ops Controls - Readiness, AI Backtesting and Restore Drill

on:
  workflow_dispatch:
    inputs:
      run_live_readiness:
        description: "Call configured HTTP readiness endpoints"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      readiness_targets:
        description: "Optional READINESS_TARGETS JSON array"
        required: false
        default: ""
      backtest_warn_only:
        description: "Do not fail workflow when AI thresholds are breached"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_mape_pct:
        description: "Max accepted average RF MAPE"
        required: true
        default: "120"
      min_wins_mape_ratio:
        description: "Min ratio of folds where RF beats baseline by MAPE"
        required: true
        default: "0.5"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ops-controls:
    name: Ejecutar controles operativos
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configurar Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20

      - name: Configurar Python 3.12 para backtesting IA
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements-dev.txt

      - name: Instalar dependencias IA
        working-directory: ai-service
        run: bash scripts/ci_install_python_deps.sh

      - name: Readiness BFF/IA
        env:
          READINESS_TARGETS: ${{ inputs.readiness_targets }}
          BFF_BASE_URL: ${{ secrets.VITE_BACKEND_API_URL }}
          AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
        run: |
          set -euo pipefail
          config_flag="--config docs/ops/readiness.sample.json"
          plan_flag="--plan-only"
          if [ "${{ inputs.run_live_readiness }}" = "true" ]; then
            config_flag=""
            plan_flag=""
          fi
          node scripts/readiness-check.mjs \
            $config_flag \
            $plan_flag \
            --warn-only \
            --output artifacts/readiness/summary.json

      - name: Backtesting IA con umbrales
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          warn_flag=""
          if [ "${{ inputs.backtest_warn_only }}" = "true" ]; then
            warn_flag="--warn-only"
          fi
          node scripts/ai-backtest-gate.mjs \
            --run \
            --allow-missing-secrets \
            --history 180 \
            --folds 6 \
            --max-mape-pct "${{ inputs.max_mape_pct }}" \
            --min-wins-mape-ratio "${{ inputs.min_wins_mape_ratio }}" \
            $warn_flag \
            --output artifacts/ai-backtesting/summary.json

      - name: Restore drill - validar evidencia de ejemplo
        run: |
          node scripts/restore-drill-check.mjs \
            --evidence docs/ops/restore-drill-evidence.example.json \
            --output artifacts/restore-drill/summary.json

      - name: Subir evidencia de controles
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ops-controls-evidence
          path: artifacts/
          retention-days: 30
