name: CI — Sistema Web con IA para Predicción de Riesgo Empresarial — Calzatura Vilchez

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Lint + Pruebas unitarias + Typecheck + Build ─────────────────────
  test-and-build:
    name: Lint + Tests + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calzatura-vilchez

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Pruebas unitarias (Vitest)
        run: npm test
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-test-api-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-test.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-test' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '123456789' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:123456789:web:abcdef' }}

      - name: Verificar tipos TypeScript
        run: npm run typecheck

      - name: Compilar proyecto (Vite build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          VITE_AI_SERVICE_BEARER_TOKEN: ${{ secrets.VITE_AI_SERVICE_BEARER_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-test-api-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-test.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-test' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '123456789' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:123456789:web:abcdef' }}

  # ── Job 2: E2E Playwright (paralelo a test-and-build) ───────────────────────
  #
  # Requisitos en GitHub → Settings → Secrets:
  #   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY — arrancan el dev server sin errores de init.
  #   El resto de VITE_* se pasan para evitar advertencias de Vite en tiempo de build/dev.
  #   Los tests usan mocks de red (page.route) para Supabase, Firebase e IA;
  #   ninguna llamada real llega a los servicios externos durante e2e.
  #
  # Archivo requerido en repo (no secreto, datos falsos):
  #   calzatura-vilchez/e2e/.auth/admin.json  — storageState con sesión Firebase fake.
  #
  # PRs desde forks: GitHub no inyecta secrets por defecto → el job e2e puede fallar al arrancar Vite.
  # Opciones futuras: environment con aprobación manual, o variables placeholder no secretas solo para dev.
  ai-service:
    name: AI Service + IRE Schema Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Pruebas backend IA (pytest)
        run: pytest

      - name: Verificar esquema real ireHistorial en Supabase si hay secretos
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_KEY" ]; then
            python scripts/verify_ire_historial_schema.py --write-probe
          else
            echo "Saltado: configura SUPABASE_URL y SUPABASE_SERVICE_KEY para validar Supabase real."
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  e2e:
    name: E2E Playwright (Chromium)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calzatura-vilchez

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Obtener versión de Playwright (para clave de caché)
        id: pw-version
        run: |
          unset NO_COLOR FORCE_COLOR
          echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Caché de navegadores Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ steps.pw-version.outputs.version }}

      - name: Instalar Chromium + dependencias del sistema (primera vez)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: |
          unset NO_COLOR FORCE_COLOR
          node scripts/run-playwright.mjs install --with-deps chromium

      - name: Instalar dependencias del sistema (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: |
          unset NO_COLOR FORCE_COLOR
          node scripts/run-playwright.mjs install-deps chromium

      - name: Ejecutar pruebas E2E
        run: |
          unset NO_COLOR FORCE_COLOR
          npm run test:e2e
        env:
          CI: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          VITE_AI_SERVICE_BEARER_TOKEN: ${{ secrets.VITE_AI_SERVICE_BEARER_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'AIzaSyBAnVUP4M6wujGs-x8EytdGabkIP7EJkwo' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'calzaturavilchez-ab17f.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'calzaturavilchez-ab17f' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '123456789' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:123456789:web:abcdef' }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Subir reporte Playwright (solo en fallo)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: calzatura-vilchez/playwright-report/
          retention-days: 7
