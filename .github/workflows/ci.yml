name: CI — Sistema Web con IA para Predicción de Riesgo Empresarial — Calzatura Vilchez

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint + Pruebas unitarias + Typecheck + Build ─────────────────────
  test-and-build:
    name: Lint + Tests + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calzatura-vilchez

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Pruebas unitarias (Vitest)
        run: npm test

      - name: Verificar tipos TypeScript
        run: npm run typecheck

      - name: Compilar proyecto (Vite build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          VITE_AI_SERVICE_BEARER_TOKEN: ${{ secrets.VITE_AI_SERVICE_BEARER_TOKEN }}

  # ── Job 2: E2E Playwright (paralelo a test-and-build) ───────────────────────
  #
  # Requisitos en GitHub → Settings → Secrets:
  #   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY — arrancan el dev server sin errores de init.
  #   El resto de VITE_* se pasan para evitar advertencias de Vite en tiempo de build/dev.
  #   Los tests usan mocks de red (page.route) para Supabase, Firebase e IA;
  #   ninguna llamada real llega a los servicios externos durante e2e.
  #
  # Archivo requerido en repo (no secreto, datos falsos):
  #   calzatura-vilchez/e2e/.auth/admin.json  — storageState con sesión Firebase fake.
  #
  # PRs desde forks: GitHub no inyecta secrets por defecto → el job e2e puede fallar al arrancar Vite.
  # Opciones futuras: environment con aprobación manual, o variables placeholder no secretas solo para dev.
  e2e:
    name: E2E Playwright (Chromium)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calzatura-vilchez

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calzatura-vilchez/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Obtener versión de Playwright (para clave de caché)
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Caché de navegadores Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ steps.pw-version.outputs.version }}

      - name: Instalar Chromium + dependencias del sistema (primera vez)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Instalar dependencias del sistema (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Ejecutar pruebas E2E
        run: npm run test:e2e
        env:
          CI: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_DNI_LOOKUP_URL: ${{ secrets.VITE_DNI_LOOKUP_URL }}
          VITE_AI_SERVICE_URL: ${{ secrets.VITE_AI_SERVICE_URL }}
          VITE_AI_SERVICE_BEARER_TOKEN: ${{ secrets.VITE_AI_SERVICE_BEARER_TOKEN }}

      - name: Subir reporte Playwright (solo en fallo)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: calzatura-vilchez/playwright-report/
          retention-days: 7
