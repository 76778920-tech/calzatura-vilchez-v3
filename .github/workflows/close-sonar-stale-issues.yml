name: Close Sonar stale script issues

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  close-stale:
    name: Close ghost issues (deleted ai-service/scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cerrar issues fantasma en SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        run: node scripts/close-sonar-stale-coverage-shim-issues.mjs
